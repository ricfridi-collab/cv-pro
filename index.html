<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Chouidira - CV Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --bg2: #111827;
            --bg3: #1a2236;
            --card: rgba(99, 102, 241, 0.04);
            --card-border: rgba(99, 102, 241, 0.15);
            --card-border-hover: rgba(129, 140, 248, 0.35);
            --accent: #818cf8;
            --accent2: #fbbf24;
            --accent3: #c4b5fd;
            --fg: #f1f5f9;
            --muted: #94a3b8;
            --danger: #f87171;
            --info: #38bdf8;
            --success: #34d399;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }
        html[dir="ltr"] body { font-family: 'Outfit', 'Cairo', sans-serif; }

        .bg-scene {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 700px 500px at 15% 15%, rgba(129,140,248,0.12), transparent),
                radial-gradient(ellipse 600px 600px at 85% 70%, rgba(251,191,36,0.06), transparent),
                radial-gradient(ellipse 900px 700px at 50% 50%, rgba(196,181,253,0.05), transparent);
        }
        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.025;
            background-image:
                linear-gradient(rgba(129,140,248,0.6) 1px, transparent 1px),
                linear-gradient(90deg, rgba(129,140,248,0.6) 1px, transparent 1px);
            background-size: 64px 64px;
        }

        .top-bar {
            position: sticky; top: 0; z-index: 50;
            background: rgba(10,14,26,0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--card-border);
        }

        .brand-logo {
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; padding: 6px 10px; border-radius: 10px;
            transition: all 0.25s; user-select: none;
        }
        .brand-logo:hover {
            background: rgba(129,140,248,0.08);
            transform: translateY(-1px);
        }
        .brand-logo:active { transform: translateY(0); }
        .brand-logo-icon {
            width: 34px; height: 34px; border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent3));
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 14px rgba(129,140,248,0.4);
            color: #fff;
        }
        .brand-logo-text {
            font-family: 'Playfair Display', serif;
            font-weight: 800; font-size: 17px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }

        .glass-card {
            background: linear-gradient(135deg, rgba(99,102,241,0.05), rgba(196,181,253,0.02));
            border: 1px solid var(--card-border);
            border-radius: 18px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .glass-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(129,140,248,0.4), transparent);
            opacity: 0; transition: opacity 0.4s;
        }
        .glass-card:hover {
            border-color: var(--card-border-hover);
            box-shadow: 0 8px 30px rgba(99,102,241,0.12), 0 0 0 1px rgba(129,140,248,0.1);
            transform: translateY(-3px);
        }
        .glass-card:hover::before { opacity: 1; }

        [data-editable] {
            outline: none;
            border-radius: 6px;
            padding: 3px 6px;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .edit-mode [data-editable]:hover {
            background: rgba(129,140,248,0.1);
            box-shadow: 0 0 0 1px rgba(129,140,248,0.4);
            cursor: text;
        }
        .edit-mode [data-editable]:focus {
            background: rgba(129,140,248,0.15);
            box-shadow: 0 0 0 2px var(--accent);
        }

        .edit-controls { display: none; }
        .edit-mode .edit-controls { display: flex; }

        .btn-icon {
            width: 32px; height: 32px; border-radius: 10px; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; font-size: 13px;
        }
        .btn-icon.add { background: rgba(129,140,248,0.18); color: var(--accent); }
        .btn-icon.add:hover { background: rgba(129,140,248,0.35); transform: scale(1.05); }
        .btn-icon.del { background: rgba(248,113,113,0.12); color: var(--danger); }
        .btn-icon.del:hover { background: rgba(248,113,113,0.25); }
        .btn-icon.link { background: rgba(56,189,248,0.12); color: var(--info); }
        .btn-icon.link:hover { background: rgba(56,189,248,0.25); }

        .lang-btn {
            padding: 7px 16px; border-radius: 10px; border: 1px solid transparent;
            background: transparent; color: var(--muted); cursor: pointer;
            font-family: inherit; font-size: 13px; font-weight: 600;
            transition: all 0.25s;
        }
        .lang-btn:hover { color: var(--fg); background: rgba(255,255,255,0.05); }
        .lang-btn.active {
            color: var(--accent); border-color: rgba(129,140,248,0.5);
            background: rgba(129,140,248,0.1);
            box-shadow: 0 2px 8px rgba(129,140,248,0.15);
        }

        .skill-tag {
            padding: 9px 18px; border-radius: 12px; font-size: 14px; font-weight: 500;
            background: linear-gradient(135deg, rgba(129,140,248,0.08), rgba(196,181,253,0.04));
            border: 1px solid rgba(129,140,248,0.18);
            color: var(--fg); transition: all 0.3s; position: relative;
        }
        .skill-tag:hover {
            background: linear-gradient(135deg, rgba(129,140,248,0.16), rgba(196,181,253,0.08));
            border-color: rgba(129,140,248,0.4);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99,102,241,0.15);
        }

        .ach-icon {
            width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            background: linear-gradient(135deg, rgba(251,191,36,0.12), rgba(251,191,36,0.04));
            color: var(--accent2);
            border: 1px solid rgba(251,191,36,0.2);
        }

        .timeline-item { position: relative; }
        .timeline-dot {
            width: 14px; height: 14px; border-radius: 50%;
            background: var(--accent); flex-shrink: 0;
            box-shadow: 0 0 14px rgba(129,140,248,0.5), 0 0 0 4px rgba(129,140,248,0.1);
            position: relative; z-index: 2;
        }
        .timeline-line {
            position: absolute; top: 14px; bottom: -20px;
            width: 2px;
            background: linear-gradient(to bottom, rgba(129,140,248,0.3), rgba(129,140,248,0.05));
        }
        html[dir="rtl"] .timeline-line { right: 6px; }
        html[dir="ltr"] .timeline-line { left: 6px; }

        .avatar-ring {
            width: 160px; height: 160px; border-radius: 50%; padding: 4px;
            background: conic-gradient(from 180deg, var(--accent), var(--accent2), var(--accent3), var(--accent));
            position: relative; flex-shrink: 0;
            animation: rotate-ring 8s linear infinite;
        }
        @keyframes rotate-ring { to { transform: rotate(360deg); } }
        .avatar-ring img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 4px solid var(--bg);
            animation: rotate-ring 8s linear infinite reverse;
        }
        .avatar-edit {
            position: absolute; inset: 4px; border-radius: 50%;
            background: rgba(0,0,0,0.65); display: none;
            align-items: center; justify-content: center;
            cursor: pointer; color: white; font-size: 22px;
            transition: background 0.2s;
        }
        .avatar-edit:hover { background: rgba(0,0,0,0.85); }
        .edit-mode .avatar-edit { display: flex; }

        .custom-section .glass-card { border-color: rgba(251,191,36,0.18); }
        .custom-section .glass-card:hover { border-color: rgba(251,191,36,0.35); }

        .reveal {
            opacity: 0; transform: translateY(30px);
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(120px);
            padding: 14px 28px; border-radius: 14px; font-size: 14px; font-weight: 600;
            background: linear-gradient(135deg, var(--accent), var(--accent3));
            color: #fff; z-index: 999;
            backdrop-filter: blur(10px); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            box-shadow: 0 8px 24px rgba(99,102,241,0.3);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error {
            background: linear-gradient(135deg, var(--danger), #ef4444);
            box-shadow: 0 8px 24px rgba(248,113,113,0.3);
        }
        .toast.success {
            background: linear-gradient(135deg, var(--success), #10b981);
            box-shadow: 0 8px 24px rgba(52,211,153,0.3);
        }

        /* روابط الفيديوهات والمقالات */
        .link-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 14px; border-radius: 10px;
            font-size: 12px; font-weight: 600;
            text-decoration: none; transition: all 0.2s;
            margin-top: 10px; margin-inline-end: 8px;
        }
        .link-btn.video {
            background: rgba(248,113,113,0.12); color: #fca5a5;
            border: 1px solid rgba(248,113,113,0.25);
        }
        .link-btn.video:hover {
            background: rgba(248,113,113,0.22); transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(248,113,113,0.2);
        }
        .link-btn.article {
            background: rgba(56,189,248,0.12); color: #7dd3fc;
            border: 1px solid rgba(56,189,248,0.25);
        }
        .link-btn.article:hover {
            background: rgba(56,189,248,0.22); transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(56,189,248,0.2);
        }
        .link-btn i { font-size: 11px; }

        .translation-notice {
            background: linear-gradient(135deg, rgba(56,189,248,0.08), rgba(129,140,248,0.05));
            border: 1px solid rgba(56,189,248,0.2);
            color: var(--info);
            padding: 12px 20px;
            border-radius: 14px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 24px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .translation-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(10,14,26,0.88); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center;
            flex-direction: column; gap: 18px;
        }
        .translation-overlay.show { display: flex; }
        .translation-overlay .spinner {
            width: 52px; height: 52px; border-radius: 50%;
            border: 3px solid rgba(129,140,248,0.2);
            border-top-color: var(--accent);
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .translation-overlay p { color: var(--muted); font-size: 14px; }

        @media print {
            .top-bar, .edit-controls, .avatar-edit, .bg-scene, .bg-grid, .toast, #particles,
            .translation-overlay, .translation-notice, .admin-badge, .cloud-status { display: none !important; }
            body { background: white !important; color: #111 !important; }
            .glass-card { border-color: #ddd !important; background: #fafafa !important; box-shadow: none !important; transform: none !important; }
            .glass-card::before { display: none !important; }
            .skill-tag { border-color: #ccc !important; background: #f0f0f0 !important; color: #111 !important; }
            .ach-icon { background: #f0f0f0 !important; color: #111 !important; }
            .timeline-dot { background: #333 !important; box-shadow: none !important; }
            .timeline-line { background: #ccc !important; }
            .avatar-ring { background: #333 !important; animation: none !important; }
            .avatar-ring img { animation: none !important; }
            * { color: #111 !important; }
            .reveal { opacity: 1 !important; transform: none !important; }
            .link-btn { border-color: #ccc !important; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(129,140,248,0.25); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(129,140,248,0.45); }

        .modal-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(10,14,26,0.8); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: linear-gradient(135deg, var(--bg2), var(--bg3));
            border: 1px solid var(--card-border);
            border-radius: 22px; padding: 36px; max-width: 520px; width: 100%;
            max-height: 90vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(129,140,248,0.1);
            position: relative;
        }
        .modal-box::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
            border-radius: 22px 22px 0 0;
        }
        .modal-input {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            background: rgba(255,255,255,0.04); border: 1px solid var(--card-border);
            color: var(--fg); font-family: inherit; font-size: 15px; outline: none;
            transition: all 0.2s;
        }
        .modal-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(129,140,248,0.15);
        }
        .modal-btn {
            padding: 11px 26px; border-radius: 12px; border: none;
            font-family: inherit; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .modal-btn.primary {
            background: linear-gradient(135deg, var(--accent), var(--accent3));
            color: #fff;
            box-shadow: 0 4px 14px rgba(99,102,241,0.3);
        }
        .modal-btn.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(99,102,241,0.4);
        }
        .modal-btn.ghost {
            background: transparent; color: var(--muted);
            border: 1px solid var(--card-border);
        }
        .modal-btn.ghost:hover { color: var(--fg); border-color: var(--muted); }

        .particle {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
            animation: float linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* اسم بتدرج ذهبي/بنفسجي */
        .name-glow {
            background: linear-gradient(135deg, #c4b5fd 0%, #fbbf24 50%, #818cf8 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 5s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .field-label {
            font-size: 12px; color: var(--muted); margin-bottom: 6px;
            font-weight: 600; display: block;
        }

        .admin-badge {
            display: none; align-items: center; gap: 6px;
            padding: 5px 12px; border-radius: 8px;
            font-size: 12px; font-weight: 700;
            background: linear-gradient(135deg, rgba(251,191,36,0.2), rgba(251,191,36,0.08));
            color: var(--accent2);
            border: 1px solid rgba(251,191,36,0.3);
        }
        body.admin-mode .admin-badge { display: inline-flex; }

        .cloud-status {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 12px; border-radius: 8px;
            font-size: 11px; font-weight: 600;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--card-border);
            color: var(--muted);
        }
        .cloud-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--muted);
            transition: all 0.3s;
        }
        .cloud-status.connected .cloud-dot {
            background: var(--success);
            box-shadow: 0 0 8px rgba(52,211,153,0.6);
        }
        .cloud-status.connected { color: var(--success); }
        .cloud-status.disconnected .cloud-dot {
            background: var(--danger);
        }
        .cloud-status.disconnected { color: var(--danger); }
        .cloud-status.local-only .cloud-dot {
            background: var(--accent2);
        }
        .cloud-status.local-only { color: var(--accent2); }

        /* زر إعادة التعيين يظهر فقط في وضع الأدمن */
        #resetBtn { display: none !important; }
        body.admin-mode.edit-active #resetBtn { display: inline-flex !important; }

        @media (prefers-reduced-motion: reduce) {
            .particle, .reveal { animation: none !important; transition: none !important; opacity: 1 !important; transform: none !important; }
            .name-glow, .avatar-ring, .avatar-ring img { animation: none !important; }
        }
    </style>
</head>
<body>
    <div class="bg-scene"></div>
    <div class="bg-grid"></div>
    <div id="particles"></div>

    <div class="translation-overlay" id="translationOverlay">
        <div class="spinner"></div>
        <p data-ui="translating">جاري الترجمة...</p>
    </div>

    <header class="top-bar">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between gap-3 flex-wrap">
            <div class="brand-logo" id="brandLogo" title="CV Pro">
                <div class="brand-logo-icon">
                    <i class="fa-solid fa-file-lines text-sm"></i>
                </div>
                <span class="brand-logo-text">CV Pro</span>
                <span class="admin-badge"><i class="fa-solid fa-shield-halved"></i> Admin</span>
            </div>

            <div class="flex items-center gap-2 flex-wrap">
                <button class="lang-btn active" data-lang="ar">العربية</button>
                <button class="lang-btn" data-lang="fr">Français</button>
                <button class="lang-btn" data-lang="en">English</button>
                <div style="width:1px;height:24px;background:var(--card-border);margin:0 6px;"></div>



                <button id="printBtn" class="lang-btn" title="طباعة">
                    <i class="fa-solid fa-print"></i>
                </button>
                <button id="resetBtn" class="lang-btn" style="color:var(--danger);" title="إعادة تعيين">
                    <i class="fa-solid fa-rotate-left"></i>
                </button>
            </div>
        </div>
    </header>

    <main id="mainContent" class="max-w-5xl mx-auto px-4 py-10 relative z-10"></main>

    <!-- نافذة إدخال كود الأدمن -->
    <div class="modal-overlay" id="adminLoginModal">
        <div class="modal-box">
            <div style="text-align:center;margin-bottom:24px;">
                <div style="width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent3));display:inline-flex;align-items:center;justify-content:center;font-size:26px;color:#fff;box-shadow:0 8px 24px rgba(99,102,241,0.4);">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <h3 class="text-xl font-bold mt-4 mb-1" style="font-family:'Playfair Display',serif;" data-ui="adminLoginTitle">وصول المحرر</h3>
                <p class="text-sm" style="color:var(--muted);" data-ui="adminLoginDesc">أدخل الكود للدخول إلى وضع التحرير</p>
            </div>
            <input class="modal-input mb-4" id="adminCodeInput" type="password" placeholder="••••••••••" dir="ltr" style="text-align:center;letter-spacing:2px;font-size:18px;">
            <p class="text-xs mb-4" id="adminError" style="color:var(--danger);text-align:center;display:none;">
                <i class="fa-solid fa-circle-exclamation"></i> <span data-ui="adminErrorText">الكود غير صحيح</span>
            </p>
            <div class="flex gap-3 justify-end">
                <button class="modal-btn ghost" id="cancelAdmin" data-ui="cancelBtn">إلغاء</button>
                <button class="modal-btn primary" id="confirmAdmin"><i class="fa-solid fa-unlock" style="margin-inline-end:6px;"></i><span data-ui="loginBtn">دخول</span></button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addSectionModal">
        <div class="modal-box">
            <h3 class="text-lg font-bold mb-4" data-ui="modalTitle">إضافة قسم جديد</h3>
            <label class="field-label" data-ui="modalPlaceholder">عنوان القسم</label>
            <input class="modal-input mb-3" id="newSectionTitle" data-placeholder="modalPlaceholder" placeholder="عنوان القسم">
            <label class="field-label" data-ui="modalContentPlaceholder">محتوى القسم...</label>
            <textarea class="modal-input mb-4" id="newSectionContent" rows="4" data-placeholder="modalContentPlaceholder" placeholder="محتوى القسم..." style="resize:vertical;"></textarea>
            <div class="flex gap-3 justify-end">
                <button class="modal-btn ghost" id="cancelSection" data-ui="cancelBtn">إلغاء</button>
                <button class="modal-btn primary" id="confirmSection" data-ui="addBtn">إضافة</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addItemModal">
        <div class="modal-box">
            <h3 class="text-lg font-bold mb-4" id="addItemTitle">إضافة عنصر</h3>
            <div id="addItemFields" class="flex flex-col gap-3 mb-4"></div>
            <div class="flex gap-3 justify-end">

    /* ========================================================
       التخزين السحابي (JSONBin.io)
       - loadDataFromCloud: يقرأ البيانات من السحابة (مشتركة لكل الزوار)
       - saveDataToCloud: يكتب البيانات إلى السحابة (للأدمن فقط)
    ======================================================== */
    async function loadDataFromCloud() {
        if (!JSONBIN_ENABLED) return null;
        try {
            const url = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`;
            const response = await fetch(url, {
                headers: { 'X-Master-Key': JSONBIN_API_KEY }
            });
            if (!response.ok) {
                throw new Error('HTTP ' + response.status);
            }
            const json = await response.json();
            console.log('[CV Pro] loadDataFromCloud: تم تحميل البيانات من السحابة');
            return json.record;
        } catch(e) {
            console.error('[CV Pro] loadDataFromCloud: فشل:', e.message);
            return null;
        }
    }

    async function saveDataToCloud(dataObj) {
        if (!JSONBIN_ENABLED) return false;
        try {
            const url = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': JSONBIN_API_KEY
                },
                body: JSON.stringify(dataObj)
            });
            if (!response.ok) {
                throw new Error('HTTP ' + response.status);
            }
            console.log('[CV Pro] saveDataToCloud: تم حفظ البيانات في السحابة');
            return true;
        } catch(e) {
            console.error('[CV Pro] saveDataToCloud: فشل:', e.message);
            return false;
        }
    }

    /* ========================================================
       إدارة البيانات
    ======================================================== */
    // دمج الروابط المبرمجة من DEFAULT_DATA_AR في البيانات المحفوظة
    // هذا يضمن أن الروابط المبرمجة تظهر دائماً حتى لو كانت البيانات المحفوظة قديمة
    function mergeHardcodedLinks(savedData) {
        if (!savedData || !savedData.ar || !savedData.ar.achievements) return savedData;
        if (!DEFAULT_DATA_AR.achievements) return savedData;
        
        savedData.ar.achievements.forEach((ach, i) => {
            const defaultAch = DEFAULT_DATA_AR.achievements[i];
            if (defaultAch) {
                // إذا كان الإنجاز في البيانات الافتراضية يحتوي على رابط، استخدمه
                if (defaultAch.videoUrl) ach.videoUrl = defaultAch.videoUrl;
                if (defaultAch.videoLabel) ach.videoLabel = defaultAch.videoLabel;
                if (defaultAch.articleUrl) ach.articleUrl = defaultAch.articleUrl;
                if (defaultAch.articleLabel) ach.articleLabel = defaultAch.articleLabel;
            }
        });
        return savedData;
    }

    async function loadData() {
        // 1. محاولة القراءة من السحابة أولاً
        let cloudData = null;
        if (JSONBIN_ENABLED) {
            cloudData = await loadDataFromCloud();
            if (cloudData && cloudData.ar) {
                cloudData = mergeHardcodedLinks(cloudData);
                data = { ar: cloudData.ar };
                console.log('[CV Pro] loadData: تم تحميل البيانات من السحابة (مشتركة)');
                // طباعة الإنجازات مع روابطها للتشخيص
                if (data.ar.achievements) {
                    data.ar.achievements.forEach((ach, i) => {
                        if (ach.videoUrl || ach.articleUrl) {
                            console.log('[CV Pro] loadData: الإنجاز #' + i + ' يحتوي على روابط:', {
                                title: ach.title,
                                videoUrl: ach.videoUrl,
                                articleUrl: ach.articleUrl
                            });
                        }
                    });
                }
                // حفظ نسخة محلية كـ cache
                try {
                    localStorage.setItem('cvProData_v6', JSON.stringify({ ar: data.ar }));
                } catch(e) {}
                // تطبيق البيانات
                applyDataDefaults();
                // تحميل ذاكرة الترجمة
                loadTranslationCacheFromStorage();
                return;
            }
        }

        // 2. fallback إلى localStorage
        let saved = localStorage.getItem('cvProData_v6');
        if (!saved) {
            saved = localStorage.getItem('cvProData_v6_backup');
            if (saved) console.log('[CV Pro] loadData: تم استخدام النسخة الاحتياطية المحلية');
        }
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed.ar) {
                    const merged = mergeHardcodedLinks(parsed);
                    data = { ar: merged.ar };
                    console.log('[CV Pro] loadData: تم تحميل البيانات من localStorage (مع دمج الروابط المبرمجة)');
                } else {
                    data = { ar: JSON.parse(JSON.stringify(DEFAULT_DATA_AR)) };
                }
            } catch(e) {
                console.error('[CV Pro] loadData: خطأ في التحليل، استخدام الافتراضي:', e);
                data = { ar: JSON.parse(JSON.stringify(DEFAULT_DATA_AR)) };
            }
        } else {
            console.log('[CV Pro] loadData: لا توجد بيانات محفوظة، استخدام الافتراضي');
            data = { ar: JSON.parse(JSON.stringify(DEFAULT_DATA_AR)) };
        }
        applyDataDefaults();
        loadTranslationCacheFromStorage();
    }

    function applyDataDefaults() {
        if (!data.ar.customSections) data.ar.customSections = [];
        if (data.ar.achievements) {
            data.ar.achievements.forEach(ach => {
                if (ach.videoUrl === undefined || ach.videoUrl === null) ach.videoUrl = '';
                if (ach.videoLabel === undefined || ach.videoLabel === null) ach.videoLabel = '';
                if (ach.articleUrl === undefined || ach.articleUrl === null) ach.articleUrl = '';
                if (ach.articleLabel === undefined || ach.articleLabel === null) ach.articleLabel = '';
            });
        }
    }

    function loadTranslationCacheFromStorage() {
        try {
            const cacheStr = localStorage.getItem('cvProTranslationCache_v3');
            if (cacheStr) translationCache = JSON.parse(cacheStr);
        } catch(e) { translationCache = {}; }
    }

    async function saveData() {
        try {
            const payload = JSON.stringify({ ar: data.ar });
            // 1. حفظ محلي دائماً (كـ cache + احتياطي)
            localStorage.setItem('cvProData_v6', payload);
            try {
                localStorage.setItem('cvProData_v6_backup', payload);
            } catch(e2) {}
            console.log('[CV Pro] saveData: تم الحفظ محلياً. حجم البيانات:', payload.length, 'بايت');

            // 2. حفظ في السحابة (مشترك بين كل الزوار)
            if (JSONBIN_ENABLED) {
                const cloudResult = await saveDataToCloud({ ar: data.ar });
                if (cloudResult) {
                    showToast('تم الحفظ في السحابة', 'success');
                } else {
                    showToast('تم الحفظ محلياً فقط (السحابة غير متاحة)', 'error');
                }
            }

            // التحقق من الروابط المحفوظة
            if (data.ar.achievements) {
                data.ar.achievements.forEach((ach, i) => {
                    if (ach.videoUrl || ach.articleUrl) {
                        console.log('[CV Pro] saveData: الإنجاز #' + i + ' لديه روابط:', {
                            videoUrl: ach.videoUrl,
                            articleUrl: ach.articleUrl
                        });
                    }
                });
            }
        } catch(e) {
            console.error('[CV Pro] saveData: فشل الحفظ:', e);
            showToast('فشل الحفظ: ' + e.message, 'error');
        }
    }

    function saveTranslationCache() {
        try {
            localStorage.setItem('cvProTranslationCache_v3', JSON.stringify(translationCache));
        } catch(e) {
            const keys = Object.keys(translationCache);
            keys.slice(0, Math.floor(keys.length / 2)).forEach(k => delete translationCache[k]);
            try { localStorage.setItem('cvProTranslationCache_v3', JSON.stringify(translationCache)); } catch(e2) {}
        }
    }

    function resetData() {
        localStorage.removeItem('cvProData_v6');
        localStorage.removeItem('cvProTranslationCache_v3');
        translationCache = {};
        data = { ar: JSON.parse(JSON.stringify(DEFAULT_DATA_AR)) };
        render();
        showToast(UI_TEXTS[currentLang].reset, 'success');

    function showToast(msg, type = '') {
        const t = document.getElementById('toast');

    /* ========================================================
       نظام الترجمة
    ======================================================== */
    function hashKey(text, targetLang) {
        return targetLang + '::' + text.substring(0, 200);
    }

    async function translateChunk(text, targetLang) {
        if (!text || !text.trim()) return text;
        if (targetLang === 'ar') return text;

        // الترجمة اليدوية أولاً
        if (MANUAL_TRANSLATIONS[targetLang] && MANUAL_TRANSLATIONS[targetLang][text]) {
            return MANUAL_TRANSLATIONS[targetLang][text];
        }

        const cacheKey = hashKey(text, targetLang);
        if (translationCache[cacheKey] !== undefined) {
            return translationCache[cacheKey];
        }

        const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=ar&tl=' + targetLang + '&dt=t&q=' + encodeURIComponent(text);

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('HTTP ' + response.status);
            const json = await response.json();
            let translated = '';
            if (json && json[0]) {
                for (const part of json[0]) {
                    if (part && part[0]) translated += part[0];
                }
            }
            if (translated) {
                translationCache[cacheKey] = translated;
                return translated;
            }
            return text;
        } catch(e) {
            console.warn('Translation failed:', e);
            return text;
        }
    }

    async function translateAll(texts, targetLang) {
        const results = new Array(texts.length);
        const batchSize = 5;
        for (let i = 0; i < texts.length; i += batchSize) {
            const batch = texts.slice(i, i + batchSize);
            const promises = batch.map((t, idx) => translateChunk(t, targetLang).then(r => { results[i + idx] = r; }));
            await Promise.all(promises);
        }
        return results;
    }

    async function getTranslatedData(targetLang) {
        if (targetLang === 'ar') return data.ar;

        const ar = data.ar;
        const textsToTranslate = [];
        const indices = {};

        function addText(text) {
            if (text && text.trim()) {
                textsToTranslate.push(text);
                return textsToTranslate.length - 1;
            }
            return -1;
        }

        indices.name = addText(ar.name);
        indices.title = addText(ar.title);
        indices.about = addText(ar.about);

        indices.experience = ar.experience.map(exp => ({
            role: addText(exp.role),
            company: addText(exp.company),
            period: addText(exp.period),
            desc: addText(exp.desc)
        }));

        indices.education = ar.education.map(edu => ({
            degree: addText(edu.degree),
            institution: addText(edu.institution),
            period: addText(edu.period),
            desc: addText(edu.desc)
        }));

        indices.skills = ar.skills.map(s => addText(s));

        indices.achievements = ar.achievements.map(ach => ({
            title: addText(ach.title),
            desc: addText(ach.desc),
            // ترجمة نصوص الروابط المخصصة (إن وجدت)
            videoLabel: addText(ach.videoLabel),
            articleLabel: addText(ach.articleLabel)
        }));

        indices.contact = { location: addText(ar.contact.location) };

        indices.customSections = ar.customSections.map(sec => ({
            title: addText(sec.title),
            content: addText(sec.content)
        }));

        const translatedTexts = await translateAll(textsToTranslate, targetLang);
        saveTranslationCache();

        function getT(idx) {
            return idx >= 0 ? (translatedTexts[idx] || textsToTranslate[idx]) : '';
        }

        return {
            name: getT(indices.name),
            title: getT(indices.title),
            about: getT(indices.about),
            avatar: ar.avatar,
            experience: ar.experience.map((exp, i) => ({
                role: getT(indices.experience[i].role),
                company: getT(indices.experience[i].company),
                period: getT(indices.experience[i].period),
                desc: getT(indices.experience[i].desc)
            })),
            education: ar.education.map((edu, i) => ({
                degree: getT(indices.education[i].degree),
                institution: getT(indices.education[i].institution),
                period: getT(indices.education[i].period),
                desc: getT(indices.education[i].desc)
            })),
            skills: ar.skills.map((s, i) => getT(indices.skills[i])),
            achievements: ar.achievements.map((ach, i) => ({
                title: getT(indices.achievements[i].title),
                desc: getT(indices.achievements[i].desc),
                icon: ach.icon,
                videoUrl: ach.videoUrl || '',
                videoLabel: getT(indices.achievements[i].videoLabel),
                articleUrl: ach.articleUrl || '',
                articleLabel: getT(indices.achievements[i].articleLabel)
            })),
            contact: {
                email: ar.contact.email,
                phone: ar.contact.phone,
                location: getT(indices.contact.location),
                linkedin: ar.contact.linkedin
            },
            customSections: ar.customSections.map((sec, i) => ({
                title: getT(indices.customSections[i].title),
                content: getT(indices.customSections[i].content)
            }))
        };
    }

    /* ========================================================

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // تحويل رابط Google Drive من /view?usp=sharing إلى معاينة مباشرة
    function optimizeGoogleDriveUrl(url) {
        // استخراج ID الملف من رابط Google Drive
        const match = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
        if (match) {
            const fileId = match[1];
            // استخدام رابط المعاينة المباشرة
            return 'https://drive.google.com/file/d/' + fileId + '/preview';
        }
        return url;
    }

    function renderAchievementLinks(ach, ui) {
        let html = '';
        if (ach.videoUrl && ach.videoUrl.trim()) {
            let url = ach.videoUrl.trim();
            const isYouTube = url.includes('youtube.com') || url.includes('youtu.be');
            const isGoogleDrive = url.includes('drive.google.com');
            const icon = isYouTube ? 'fa-youtube' : (isGoogleDrive ? 'fa-google-drive' : 'fa-play');
            // استخدام النص المخصص إن وجد، وإلا استخدام النص الافتراضي
            let label = ach.videoLabel && ach.videoLabel.trim() ? ach.videoLabel : ui.watchVideo;
            html += `<a href="${escapeHtml(url)}" target="_blank" rel="noopener" class="link-btn video"><i class="fa-brands ${icon}"></i><span>${escapeHtml(label)}</span></a>`;
        }
        if (ach.articleUrl && ach.articleUrl.trim()) {
            let url = ach.articleUrl.trim();
            let label = ach.articleLabel && ach.articleLabel.trim() ? ach.articleLabel : ui.readArticle;
            html += `<a href="${escapeHtml(url)}" target="_blank" rel="noopener" class="link-btn article"><i class="fa-solid fa-file-lines"></i><span>${escapeHtml(label)}</span></a>`;
        }
        return html;
    }

    async function render() {
        const ui = UI_TEXTS[currentLang];
        const isRTL = currentLang === 'ar';
        const dir = isRTL ? 'rtl' : 'ltr';
        document.documentElement.lang = currentLang;
        document.documentElement.dir = dir;
        document.body.style.fontFamily = isRTL ? "'Cairo', sans-serif" : "'Outfit', sans-serif";

        document.querySelectorAll('.lang-btn[data-lang]').forEach(b => {
            b.classList.toggle('active', b.dataset.lang === currentLang);
        });

        document.querySelectorAll('[data-ui]').forEach(el => {
            const key = el.dataset.ui;
            if (ui[key]) el.textContent = ui[key];
        });
        document.querySelectorAll('[data-placeholder]').forEach(el => {
            const key = el.dataset.placeholder;
            if (ui[key]) el.placeholder = ui[key];
        });

        const main = document.getElementById('mainContent');

        if (currentLang === 'ar') {
            main.innerHTML = buildHTML(data.ar, ui, isRTL);
            afterRender();
        } else {
            const overlay = document.getElementById('translationOverlay');
            overlay.classList.add('show');
            main.innerHTML = '';

            try {
                const translated = await getTranslatedData(currentLang);
                main.innerHTML = buildHTML(translated, ui, isRTL);
            } catch(e) {
                console.error('Translation error:', e);
                main.innerHTML = '<div class="translation-notice"><i class="fa-solid fa-triangle-exclamation"></i><span>تعذرت الترجمة، عرض المحتوى العربي</span></div>' + buildHTML(data.ar, ui, true);
            } finally {
                overlay.classList.remove('show');
                afterRender();
            }
        }
    }

    function afterRender() {
        const main = document.getElementById('mainContent');
        main.classList.toggle('edit-mode', editMode && isAdmin && currentLang === 'ar');
        document.body.classList.toggle('edit-active', editMode && isAdmin);
        bindEditableEvents();

        const avatarInput = document.getElementById('avatarInput');
        if (avatarInput) {
            avatarInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = async function(ev) {
                        data.ar.avatar = ev.target.result;
                        const img = document.getElementById('avatarImg');
                        if (img) img.src = ev.target.result;
                        await saveData();
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        requestAnimationFrame(() => {
            document.querySelectorAll('.reveal').forEach((el, i) => {
                setTimeout(() => el.classList.add('visible'), i * 60);
            });
        });
    }

    /* ========================================================
       التحرير (للأدمن فقط وفي الوضع العربي)
    ======================================================== */
    function bindEditableEvents() {
        document.querySelectorAll('[data-editable]').forEach(el => {
            el.addEventListener('blur', async function() {
                if (!editMode || !isAdmin || currentLang !== 'ar') return;
                const path = this.dataset.editable;
                const value = this.textContent.trim();
                setNestedValue(data.ar, path, value);
                await saveData();
                invalidateTranslationCache(path);
            });
            if (!el.hasAttribute('data-allow-newline')) {
                el.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.blur();
                    }
                });
            }
        });
    }

    function invalidateTranslationCache(path) {
        translationCache = {};
        try { localStorage.removeItem('cvProTranslationCache_v3'); } catch(e) {}
    }

    function setNestedValue(obj, path, value) {
        const parts = path.split('.');
        let current = obj;
        for (let i = 0; i < parts.length - 1; i++) {
            current = current[parts[i]];
        }
        current[parts[parts.length - 1]] = value;
    }

    async function removeItem(section, index) {
        if (!isAdmin || currentLang !== 'ar') return;
        data.ar[section].splice(index, 1);
        invalidateTranslationCache();
        render();
        await saveData();
    }

            });

                degree, institution: getVal('institution'), period: getVal('period'), desc: getVal('desc')
            });

    document.getElementById('confirmLinks').addEventListener('click', async () => {
        if (currentEditLinksIndex === null) {
            console.warn('[CV Pro] confirmLinks: لا يوجد فهرس محدد');
            return;
        }
        const idx = currentEditLinksIndex;
        const ach = data.ar.achievements[idx];
        if (!ach) {
            console.error('[CV Pro] الإنجاز غير موجود:', idx);
            return;
        }
        // قراءة القيم من الحقول
        const videoUrl = document.getElementById('editVideoUrl').value.trim();
        const videoLabel = document.getElementById('editVideoLabel').value.trim();
        const articleUrl = document.getElementById('editArticleUrl').value.trim();
        const articleLabel = document.getElementById('editArticleLabel').value.trim();

        // تطبيق القيم على البيانات
        ach.videoUrl = videoUrl;
        ach.videoLabel = videoLabel;
        ach.articleUrl = articleUrl;
        ach.articleLabel = articleLabel;

        console.log('[CV Pro] تم تحديث الإنجاز #' + idx + ':', {
            title: ach.title,
            videoUrl: ach.videoUrl,
            videoLabel: ach.videoLabel,
            articleUrl: ach.articleUrl,
            articleLabel: ach.articleLabel
        });

        // الحفظ أولاً قبل أي شيء آخر لضمان عدم فقدان البيانات
        await saveData();
        // التحقق من الحفظ
        const saved = localStorage.getItem('cvProData_v6');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                const savedAch = parsed.ar && parsed.ar.achievements && parsed.ar.achievements[idx];

                    console.log('[CV Pro] تم التحقق من الحفظ. videoUrl في التخزين:', savedAch.videoUrl);

    });


    document.getElementById('resetBtn').addEventListener('click', function() {
        const msg = currentLang === 'ar' ? 'هل أنت متأكد من إعادة تعيين جميع البيانات؟' :
                    currentLang === 'fr' ? 'Êtes-vous sûr de réinitialiser toutes les données ?' :
                    'Are you sure you want to reset all data?';
        if (confirm(msg)) resetData();
    });

    document.getElementById('printBtn').addEventListener('click', () => window.print());

    /* ========================================================
       الجسيمات المتحركة
    ======================================================== */
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 3 + 1;
            const colors = ['rgba(129,140,248,0.35)', 'rgba(251,191,36,0.3)', 'rgba(196,181,253,0.3)'];
            const color = colors[Math.floor(Math.random() * colors.length)];
            p.style.cssText = `
                width: ${size}px; height: ${size}px;
                left: ${Math.random() * 100}%;
                background: ${color};
                animation-duration: ${Math.random() * 20 + 18}s;
                animation-delay: ${Math.random() * 15}s;
            `;
            container.appendChild(p);
        }
    }

    // بدء التشغيل
    (async () => {
        await loadData();
        await render();
        createParticles();
        console.log('[CV Pro] تم بدء التشغيل. البيانات الحالية:', data.ar);
    })();
    </script>
</body>
